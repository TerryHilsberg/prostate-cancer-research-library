site_name: Prostate Cancer Research Library
site_description: Patient-perspective prostate cancer diagnosis and treatment research repository
site_url: https://TerryHilsberg.github.io/prostate-cancer-research-library/
repo_name: prostate-cancer-research-library
nav:
  - Home: index.md
  - Patient Perspective:
      - Overview: topics/prostate-cancer-patient/index.md
      - Decision Map: topics/prostate-cancer-patient/decision-map.md
      - Questions for Clinicians: topics/prostate-cancer-patient/clinician-questions.md
      - Glossary: topics/prostate-cancer-patient/glossary.md
      - Open Questions: topics/prostate-cancer-patient/open-questions.md
  - Categories:
      - Category Index: categories/index.md
      - Screening & Early Detection: categories/screening-early-detection.md
      - Diagnostic Workup: categories/diagnostic-workup.md
      - Risk Stratification & Staging: categories/risk-stratification-staging.md
      - Active Surveillance: categories/active-surveillance.md
      - Localized Treatment: categories/localized-treatment.md
      - Advanced & Recurrent Disease: categories/advanced-recurrent-disease.md
      - Imaging & Biomarkers: categories/imaging-biomarkers.md
      - Side Effects & Quality of Life: categories/side-effects-quality-of-life.md
      - Nutrition: categories/nutrition.md
      - Exercise: categories/exercise.md
      - Shared Decision-Making: categories/shared-decision-making.md
      - Guidelines & Care Pathways: categories/guidelines-care-pathways.md
  - Papers:
      - Paper Repository: papers/index.md
      - Exercise and Prostate Cancer Evidence: papers/exercise-prostate-cancer-evidence/index.md
      - Nutrition and Prostate Cancer Evidence: papers/nutrition-prostate-cancer-evidence/index.md
      - Blood Pressure and Prostate Cancer Evidence: papers/blood-pressure-prostate-cancer-evidence/index.md
  - Updates:
      - Latest Updates: updates/index.md
  - Policies:
      - Selection Policy: policies/selection-policy.md
      - Medical Safety Policy: policies/medical-safety-policy.md
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: deep orange
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
plugins:
  - search
